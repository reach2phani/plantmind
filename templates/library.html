<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantMind - Document Library</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f8fafc}
.nav{background:#1e293b;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.nav-brand{font-size:18px;font-weight:700;color:#fff}
.nav-brand span{color:#a5b4fc}


.page-tabs{background:#fff;border-bottom:1.5px solid #e2e8f0;padding:0 20px;display:flex;flex-shrink:0}
.page-tab{padding:11px 18px;font-size:13px;font-weight:500;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;text-decoration:none;display:block}
.page-tab.active{color:#4f46e5;border-bottom-color:#4f46e5}
.main{max-width:960px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px}
.stat-num{font-size:24px;font-weight:600;color:#0f172a}
.stat-lbl{font-size:12px;color:#64748b;margin-top:2px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;display:flex;align-items:center;padding:0 12px;height:38px}
.search-wrap input{border:none;outline:none;font-size:13px;flex:1;color:#0f172a;background:transparent}
.filter-select{padding:0 12px;height:38px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;color:#475569;background:#fff;outline:none;cursor:pointer}
.toggle-archived{padding:0 14px;height:38px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;color:#94a3b8;background:#fff;cursor:pointer;white-space:nowrap}
.toggle-archived.on{border-color:#a5b4fc;color:#4f46e5;background:#eef2ff}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.results-count{font-size:13px;color:#64748b}
.results-count strong{color:#0f172a}
.doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.doc-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;transition:all .15s;position:relative}
.doc-card:hover{border-color:#a5b4fc}
.doc-card.archived{opacity:.55}
.doc-card.editing{border-color:#4f46e5;background:#eef2ff}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.doc-icon{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.icon-pdf{background:#fef2f2;color:#b91c1c}
.icon-docx{background:#eff6ff;color:#1d4ed8}
.icon-mp4{background:#faf5ff;color:#7c3aed}
.icon-csv{background:#f0fdf4;color:#166534}
.icon-other{background:#f8fafc;color:#64748b}
.doc-type-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.b-sop{background:#f0fdf4;color:#166534}
.b-work-instruction{background:#eff6ff;color:#1e40af}
.b-training{background:#faf5ff;color:#7c3aed}
.b-ncr{background:#fff7ed;color:#c2410c}
.b-shift-log{background:#f0fdf4;color:#166534}
.b-batch-record{background:#fdf4ff;color:#7e22ce}
.b-other,.b-archived{background:#f8fafc;color:#64748b}
.doc-name{font-size:13px;font-weight:500;color:#0f172a;margin-bottom:4px;line-height:1.4;word-break:break-word}
.doc-meta{font-size:11px;color:#94a3b8;line-height:1.6}
.embed-status{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.es-done{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.es-pending{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.es-failed{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
.es-none{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}
.es-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.es-dot-done{background:#16a34a}
.es-dot-pending{background:#d97706;animation:pulse .8s infinite alternate}
.es-dot-failed{background:#e11d48}
.es-dot-none{background:#94a3b8}
@keyframes pulse{from{opacity:1}to{opacity:.3}}
.equip-tag{display:inline-block;font-size:10px;font-family:monospace;background:#eef2ff;color:#3730a3;padding:1px 6px;border-radius:4px;margin-top:3px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9}
.rev-badge{font-size:10px;font-family:monospace;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:4px}
.status-ready{display:flex;align-items:center;gap:4px;font-size:11px;color:#16a34a}
.status-archived{display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8}
.status-dot{width:5px;height:5px;border-radius:50%}
.dot-green{background:#16a34a}
.dot-gray{background:#94a3b8}
.card-actions{display:flex;gap:6px;margin-top:10px}
.btn-edit{font-size:11px;padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;background:#fff;color:#475569;transition:all .15s}
.btn-edit:hover{border-color:#a5b4fc;color:#4f46e5}
.ask-about{font-size:11px;padding:4px 10px;border:1px solid #c7d2fe;border-radius:6px;cursor:pointer;background:#eef2ff;color:#4f46e5;text-decoration:none;transition:all .15s}
.ask-about:hover{background:#e0e7ff}

/* Edit form */
.edit-form{border-top:1px solid #c7d2fe;margin-top:10px;padding-top:10px}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.edit-field{display:flex;flex-direction:column;gap:2px}
.edit-field.full{grid-column:1/-1}
.edit-label{font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.03em}
.edit-input{padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#0f172a;background:#fff;outline:none}
.edit-input:focus{border-color:#4f46e5}
.edit-btns{display:flex;gap:6px;margin-top:8px}
.btn-save{flex:1;padding:7px;background:#4f46e5;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn-save:hover{background:#4338ca}
.btn-cancel{padding:7px 12px;background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;cursor:pointer}
.btn-cancel:hover{border-color:#cbd5e1}
.save-msg{font-size:11px;color:#16a34a;text-align:center;margin-top:6px;display:none}

.empty{text-align:center;padding:48px 24px;color:#94a3b8;grid-column:1/-1}
.empty-title{font-size:15px;font-weight:500;color:#475569;margin-bottom:6px}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">Plant<span>Mind</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="/plant-setup" style="font-size:11px;color:#a5b4fc;padding:4px 10px;border-radius:6px;border:1px solid #4f46e5;background:rgba(79,70,229,.15);text-decoration:none;white-space:nowrap">⚙ Plant setup</a>
    <div style="display:flex;align-items:center;gap:6px;background:#0f172a;padding:4px 10px;border-radius:6px">
      <div style="width:22px;height:22px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0">GP</div>
      <span style="font-size:11px;color:#e2e8f0;font-weight:500;white-space:nowrap">G. Phani</span>
    </div>
  </div>
</div>
<div class="page-tabs">
  <a class="page-tab" href="/chat">Ask</a>
  <a class="page-tab active" href="/library">Library</a>
  <a class="page-tab" href="/alerts">Alerts <span id="alertsTabBadge" style="display:none;font-size:10px;background:#dc2626;color:#fff;padding:1px 6px;border-radius:999px;margin-left:2px;font-weight:700"></span></a>
  <a class="page-tab" href="/graph">Graph</a>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">-</div><div class="stat-lbl">Total documents</div></div>
    <div class="stat"><div class="stat-num" id="statReady">-</div><div class="stat-lbl">Ready for Q&A</div></div>
    <div class="stat"><div class="stat-num" id="statTypes">-</div><div class="stat-lbl">Document types</div></div>
    <div class="stat"><div class="stat-num" id="statLines">-</div><div class="stat-lbl">Production lines</div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search by name, equipment tag, or keyword..." oninput="filterDocs()">
    </div>
    <select class="filter-select" id="plantFilter" onchange="onLibPlantChange()"><option value="">All plant sites</option></select>
    <select class="filter-select" id="lineFilter"  onchange="onLibLineChange()"><option value="">All lines</option></select>
    <select class="filter-select" id="typeFilter"  onchange="filterDocs()"><option value="">All types</option></select>
    <select class="filter-select" id="equipFilter" onchange="filterDocs()"><option value="">All equipment</option></select>
    <button class="toggle-archived" id="archivedToggle" onclick="toggleArchived()">Show archived</button>
  </div>
  <div class="results-header">
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div class="doc-grid" id="docGrid">
    <div class="empty"><div class="empty-title">Loading documents...</div></div>
  </div>
</div>
<style>
.pagination{display:none;align-items:center;justify-content:center;gap:12px;margin-top:20px;padding:4px 0}
.pg-btn{padding:7px 16px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#475569;transition:all .15s}
.pg-btn:hover:not([disabled]){border-color:#a5b4fc;color:#4f46e5}
.pg-btn[disabled]{opacity:.4;cursor:not-allowed}
.pg-info{font-size:13px;color:#64748b}
.pg-info strong{color:#0f172a}
</style>
<div id="pagination" class="pagination"></div>
<script src="/static/nav_context.js"></script>
<script>
var allDocs      = [];
var showArchived = false;
var editingId    = null;
var currentPage  = 1;
var PAGE_SIZE    = 12;

fetch('/api/documents')
  .then(function(r){return r.json()})
  .then(function(data){
    allDocs = data.documents||[];
    populateFilters();
    updateStats();
    // Restore search — filter state restored after API loads in populateFilters
    try {
      var savedSearch = localStorage.getItem('pm_lib_search');
      if (savedSearch) document.getElementById('searchInput').value = savedSearch;
    } catch(e) {}
  })
  .catch(function(){
    document.getElementById('docGrid').innerHTML='<div class="empty"><div class="empty-title">Could not load documents</div></div>';
  });

function populateFilters(){
  // Doc types still derived from documents
  var types=[...new Set(allDocs.map(function(d){return d.doc_type}).filter(Boolean))];
  function populate(id,items){
    var s=document.getElementById(id);
    if(!s) return;
    items.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o)});
  }
  populate('typeFilter',types);

  // Load plants, lines, equipment from API
  fetch('/api/plant-sites')
    .then(function(r){return r.json();})
    .then(function(data){
      var sites = data.plant_sites||[];
      var pSel = document.getElementById('plantFilter');
      if(pSel) sites.forEach(function(s){
        var o=document.createElement('option');o.value=s.name;o.textContent=s.name;pSel.appendChild(o);
      });
      return fetch('/api/lines');
    })
    .then(function(r){return r.json();})
    .then(function(data){
      window._libLines = data.lines||[];
      populateLibLines();
      return fetch('/api/equipment');
    })
    .then(function(r){return r.json();})
    .then(function(data){
      window._libEquipment = data.equipment||[];
      populateLibEquip();
      // Restore saved filter state after dropdowns populated
      try {
        var savedPlant = localStorage.getItem('pm_lib_plant')||localStorage.getItem('pm_plant')||'';
        var savedLine  = localStorage.getItem('pm_lib_line') ||localStorage.getItem('pm_line') ||'';
        if(savedPlant){document.getElementById('plantFilter').value=savedPlant;}
        if(savedLine) {document.getElementById('lineFilter').value=savedLine;}
        populateLibLines(savedPlant);
        populateLibEquip(savedPlant, savedLine);
      } catch(e){}
      filterDocs();
    })
    .catch(function(){filterDocs();});
}

function populateLibLines(plant){
  var sel = document.getElementById('lineFilter');
  if(!sel) return;
  var current = sel.value;
  sel.innerHTML = '<option value="">All lines</option>';
  var lines = (window._libLines||[]).filter(function(l){return !plant||l.plant_site===plant;});
  lines.forEach(function(l){
    var o=document.createElement('option');o.value=l.name;o.textContent=l.name;
    if(l.name===current) o.selected=true;
    sel.appendChild(o);
  });
}

function populateLibEquip(plant, line){
  var sel = document.getElementById('equipFilter');
  if(!sel) return;
  var current = sel.value;
  sel.innerHTML = '<option value="">All equipment</option>';
  var equip = (window._libEquipment||[]).filter(function(e){
    return e.active!==false && (!plant||e.plant_site===plant) && (!line||e.line===line);
  });
  equip.forEach(function(e){
    var o=document.createElement('option');o.value=e.equip_tag;o.textContent=e.equip_tag+' — '+e.name;
    if(e.equip_tag===current) o.selected=true;
    sel.appendChild(o);
  });
}

function updateStats(){
  var active=allDocs.filter(function(d){return d.status==='uploaded'});
  var types=new Set(active.map(function(d){return d.doc_type}).filter(Boolean));
  var lines=new Set(active.map(function(d){return d.line}).filter(Boolean));
  document.getElementById('statTotal').textContent=active.length;
  document.getElementById('statReady').textContent=active.length;
  document.getElementById('statTypes').textContent=types.size;
  document.getElementById('statLines').textContent=lines.size;
}

function toggleArchived(){
  currentPage=1;
  showArchived=!showArchived;
  var btn=document.getElementById('archivedToggle');
  btn.classList.toggle('on',showArchived);
  btn.textContent=showArchived?'Hide archived':'Show archived';
  filterDocs();
}

function onLibPlantChange(){
  var plant = document.getElementById('plantFilter').value;
  localStorage.setItem('pm_lib_plant', plant);
  populateLibLines(plant);
  populateLibEquip(plant, '');
  filterDocs();
}

function onLibLineChange(){
  var plant = document.getElementById('plantFilter').value;
  var line  = document.getElementById('lineFilter').value;
  localStorage.setItem('pm_lib_line', line);
  populateLibEquip(plant, line);
  filterDocs();
}

function filterDocs(opts){
  if(!opts || !opts.keepPage) currentPage=1;
  var search=document.getElementById('searchInput').value.toLowerCase();
  var plant=document.getElementById('plantFilter').value;
  var line=document.getElementById('lineFilter').value;
  // Save filter state to localStorage so it survives page refresh
  try {
    localStorage.setItem('pm_lib_search', search);
    localStorage.setItem('pm_lib_plant',  plant);
    localStorage.setItem('pm_lib_line',   line);
  } catch(e) {}
  var type=document.getElementById('typeFilter').value;
  var equip=document.getElementById('equipFilter').value;
  var filtered=allDocs.filter(function(d){
    if(!showArchived&&d.status==='archived') return false;
    if(plant&&d.plant_site!==plant) return false;
    if(line&&d.line!==line) return false;
    if(type&&d.doc_type!==type) return false;
    if(equip&&d.equip_tag!==equip) return false;
    if(search){
      var hay=(d.name+' '+(d.plant_site||'')+' '+(d.line||'')+' '+(d.doc_type||'')+' '+(d.equip_tag||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });
  var total=allDocs.filter(function(d){return showArchived||d.status!=='archived'}).length;
  var totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(currentPage>totalPages) currentPage=1;
  var start=(currentPage-1)*PAGE_SIZE;
  var pageItems=filtered.slice(start,start+PAGE_SIZE);
  document.getElementById('resultsCount').innerHTML=
    'Showing <strong>'+(filtered.length===0?0:start+1)+'&ndash;'+Math.min(start+PAGE_SIZE,filtered.length)+'</strong> of <strong>'+filtered.length+'</strong> documents';
  var grid=document.getElementById('docGrid');
  if(filtered.length===0){
    document.getElementById('pagination').style.display='none';
    grid.innerHTML='<div class="empty"><div class="empty-title">No documents match</div></div>';
    return;
  }
  grid.innerHTML=pageItems.map(function(doc){return renderCard(doc)}).join('');
  renderPagination(currentPage,totalPages,filtered.length);
}

function renderPagination(page,totalPages,total){
  var pg=document.getElementById('pagination');
  if(totalPages<=1){pg.style.display='none';return;}
  pg.style.display='flex';
  pg.innerHTML=
    '<button class="pg-btn" onclick="goPage('+page+'-1)" '+(page<=1?'disabled':'')+'>&#8592; Previous</button>'+
    '<span class="pg-info">Page <strong>'+page+'</strong> of <strong>'+totalPages+'</strong></span>'+
    '<button class="pg-btn" onclick="goPage('+page+'+1)" '+(page>=totalPages?'disabled':'')+'>Next &#8594;</button>';
}

function goPage(p){
  currentPage=p;
  filterDocs({keepPage:true});
  window.scrollTo(0,0);
}

function embedStatusBadge(doc) {
  var s = doc.embed_status;
  var ts = doc.last_embedded_at ? ' title="Last indexed: ' + new Date(doc.last_embedded_at).toLocaleString() + '"' : '';
  if (!s || s === 'done')
    return '<span class="embed-status es-done"' + ts + '><span class="es-dot es-dot-done"></span>Indexed</span>';
  if (s === 'pending')
    return '<span class="embed-status es-pending"><span class="es-dot es-dot-pending"></span>Indexing…</span>';
  if (s === 'failed')
    return '<span class="embed-status es-failed" title="Re-upload to fix"><span class="es-dot es-dot-failed"></span>Index failed</span>';
  return '<span class="embed-status es-none"><span class="es-dot es-dot-none"></span>Not indexed</span>';
}

function renderCard(doc){
  var ft=(doc.file_type||'other').toLowerCase();
  var valid=['pdf','docx','mp4','csv'];
  var ic=valid.indexOf(ft)>=0?ft:'other';
  var dt=doc.doc_type||'Other';
  var dtCls=doc.status==='archived'?'archived':dt.toLowerCase().replace(/ /g,'-');
  var isArch=doc.status==='archived';
  var date=doc.created_at?new Date(doc.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
  var isEditing=editingId===doc.id;

  return '<div class="doc-card'+(isArch?' archived':'')+(isEditing?' editing':'')+'" id="card-'+doc.id+'">' +
    '<div class="card-top">' +
      '<div class="doc-icon icon-'+ic+'">'+ft.toUpperCase()+'</div>' +
      '<span class="doc-type-badge b-'+dtCls+'">'+(isArch?'Archived':dt)+'</span>' +
    '</div>' +
    '<div class="doc-name">'+escHtml(doc.name)+'</div>' +
    '<div class="doc-meta">'+(doc.plant_site||'')+(doc.line?' &middot; '+doc.line:'')+(date?' &middot; '+date:'')+'</div>' +
    (doc.equip_tag?'<div><span class="equip-tag">'+escHtml(doc.equip_tag)+'</span></div>':'')+
    (!isArch ? '<div style="margin-top:5px">' + embedStatusBadge(doc) + '</div>' : '') +
    '<div class="card-footer">' +
      '<span class="rev-badge">Rev '+escHtml(doc.revision||'1.0')+'</span>' +
      (isArch
        ?'<div class="status-archived"><div class="status-dot dot-gray"></div>Archived</div>'
        :'<div class="status-ready"><div class="status-dot dot-green"></div>Ready</div>') +
    '</div>' +
    (!isArch ?
      '<div class="card-actions">' +
        '<button class="btn-edit" onclick="toggleEdit(\''+doc.id+'\')">'+(isEditing?'Cancel edit':'Edit tags')+'</button>' +
        '<a class="ask-about" href="/chat?q='+encodeURIComponent('Tell me about '+doc.name)+'">Ask about this &rarr;</a>' +
      '</div>' : ''
    ) +
    (isEditing ? renderEditForm(doc) : '') +
  '</div>';
}

function renderEditForm(doc){
  return '<div class="edit-form">' +
    '<div class="edit-row">' +
      '<div class="edit-field">' +
        '<span class="edit-label">Plant site</span>' +
        '<select class="edit-input" id="ep-'+doc.id+'">' +
          '<option value="">-- select --</option>' +
          ['Houston Plant','Deer Park Facility'].map(function(p){return '<option value="'+p+'"'+(doc.plant_site===p?' selected':'')+'>'+p+'</option>'}).join('') +
        '</select>' +
      '</div>' +
      '<div class="edit-field">' +
        '<span class="edit-label">Line</span>' +
        '<select class="edit-input" id="el-'+doc.id+'">' +
          '<option value="">-- select --</option>' +
          ['Line 1','Line 2','Line 3'].map(function(l){return '<option value="'+l+'"'+(doc.line===l?' selected':'')+'>'+l+'</option>'}).join('') +
        '</select>' +
      '</div>' +
      '<div class="edit-field">' +
        '<span class="edit-label">Doc type</span>' +
        '<select class="edit-input" id="et-'+doc.id+'">' +
          ['SOP','Work Instruction','Batch Record','NCR','Training','Shift Log','Other'].map(function(t){return '<option value="'+t+'"'+(doc.doc_type===t?' selected':'')+'>'+t+'</option>'}).join('') +
        '</select>' +
      '</div>' +
      '<div class="edit-field">' +
        '<span class="edit-label">Revision</span>' +
        '<input class="edit-input" id="er-'+doc.id+'" type="text" value="'+escHtml(doc.revision||'1.0')+'">' +
      '</div>' +
      '<div class="edit-field full">' +
        '<span class="edit-label">Equipment tag</span>' +
        '<input class="edit-input" id="ee-'+doc.id+'" type="text" value="'+escHtml(doc.equip_tag||'')+'" placeholder="e.g. P-201, R-04">' +
      '</div>' +
    '</div>' +
    '<div class="edit-btns">' +
      '<button class="btn-save" onclick="saveEdit(\''+doc.id+'\')">Save and re-index</button>' +
      '<button class="btn-cancel" onclick="toggleEdit(\''+doc.id+'\')">Cancel</button>' +
    '</div>' +
    '<div class="save-msg" id="sm-'+doc.id+'">Saved — re-indexing in background...</div>' +
  '</div>';
}

function toggleEdit(docId){
  editingId = editingId === docId ? null : docId;
  filterDocs();
}

function saveEdit(docId){
  var updates = {
    plant_site: document.getElementById('ep-'+docId).value,
    line:       document.getElementById('el-'+docId).value,
    doc_type:   document.getElementById('et-'+docId).value,
    revision:   document.getElementById('er-'+docId).value,
    equip_tag:  document.getElementById('ee-'+docId).value,
  };
  fetch('/api/documents/'+docId, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(updates)
  })
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.success){
      var idx = allDocs.findIndex(function(d){return d.id===docId});
      if(idx>=0) Object.assign(allDocs[idx], updates);
      var msg = document.getElementById('sm-'+docId);
      if(msg){msg.style.display='block'}
      setTimeout(function(){
        editingId = null;
        updateStats();
        filterDocs();
      }, 1500);
    }
  })
  .catch(function(){alert('Save failed — check the server is running')});
}

function escHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>

<script>
// ── Alert badge polling ───────────────────────────────────────────────────────
function updateAlertBadge() {
  fetch('/api/alerts/count')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var badge = document.getElementById('alertsTabBadge');
      if (!badge) return;
      var n = d.count || 0;
      badge.textContent  = n;
      badge.style.display = n > 0 ? 'inline' : 'none';
    })
    .catch(function() {});
}
updateAlertBadge();
setInterval(updateAlertBadge, 30000);
</script>
</body>
</html>
